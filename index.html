<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>
    <style>

    *{
        text-decoration: none;
        padding: 0%;
        margin: 0%;
        font-family: Arial, Helvetica, sans-serif;
    }
        
    #navbar{
        background-image: linear-gradient(90deg,rgb(42, 44, 76),rgb(62, 70, 115));
        padding-left: 20px;
        padding-right: 20px;
        height: 100px;
    }

    #navdiv{
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    li{
        list-style: none;
        display: inline-block;
        margin-right: 20px;
    }
        
    .logo a{
        color: rgb(239, 238, 255);
        font-weight: bold;
        font-size: 40px;
        
    }

    li a{
        color: rgb(239, 238, 255);
        font-weight: bold;
        font-size: 30px;
        padding: 10px;
    }

   
   
    li a:hover{
        height: 70px;
        width: 150px;
        background-color: rgba(29, 31, 53, 0.884);
    }

    .b1{
        height: 675px;
        background-image: url("https://cdn.commercialcafe.com/images/0EA8C944-ADE1-4446-8187-1E5AF3484BDB/1557963.jpg");
        background-size:cover;
    }

    .b1 h1{
        padding: 20px;
        text-align: center;
        color: rgb(77, 77, 149);
    } 

    .b1 h3{
        padding: 20px;
        text-align: center;
        color: rgb(77, 77, 149);
    }


    </style>
</head>
<body>

    <nav id="navbar">
    
    <div id="navdiv">
    <div class="logo"> <a href="#">ABC Training Institude</a></div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Course</a></li>
        <li><a href="#">Schedule</a></li>
        <li><a href="#">Register</a></li>
    </ul>
    </div>
    </nav>

<div class="b1">
    <h1>Welcome to ABC Training Institute</h1>
    <hr>
    <h3>Empowering Your Future with Quality Education</h3>
</div>
</body>
</html>
