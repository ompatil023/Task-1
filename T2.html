<!DOCTYPE html>
<html lang="en">

    <title>Course</title>
    <style>

        *{

        }

        #navbar{
        background-image: linear-gradient(90deg,rgb(42, 44, 76),rgb(62, 70, 115));

        }

        #navdiv{

        font-size: 40px;
        
        }

        }

        }

        body{
